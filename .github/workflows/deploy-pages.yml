name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: |
          mkdir -p _site

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='/config.js' \
            --exclude='/config.local.js' \
            --exclude='/config.local.example.js' \
            --exclude='.env' \
            --exclude='.env.local' \
            . _site/

          cat > _site/config.js <<EOF
          window.PANORAMIC_SCENE_CONFIG = {
              AI_PROVIDER: '${{ vars.AI_PROVIDER || 'pollinations' }}',
              IMAGE_PROVIDER: '${{ vars.IMAGE_PROVIDER || 'pollinations' }}',
              POLLINATIONS_API_BASE_URL: '${{ vars.POLLINATIONS_API_BASE_URL || 'https://gen.pollinations.ai' }}',
              POLLINATIONS_IMAGE_BASE_URL: '${{ vars.POLLINATIONS_IMAGE_BASE_URL || 'https://gen.pollinations.ai/image' }}',
              POLLINATIONS_API_KEY: '${{ secrets.POLLINATIONS_API_KEY }}',
              POLLINATIONS_IMAGE_MODEL: '${{ vars.POLLINATIONS_IMAGE_MODEL || 'flux' }}'
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
